<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            padding: 10px;
            width: 70%;
        }

        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }

        li {
            margin: 10px;
            list-style: none;
        }

        a {
            color: red;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>To-Do List</h2>

    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="Enter task">
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for task in tasks %}
        <li>
            {{ task }}
            <a href="/delete/{{ loop.index0 }}">❌</a>
        </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
